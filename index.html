<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tree → zip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --border2: #1e1e2e;
    --accent: #7fffb2;
    --accent2: #ff7f50;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --mono: 'Space Mono', monospace;
    --sans: 'Noto Sans JP', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 80px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(127,255,178,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(127,255,178,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
    animation: gridDrift 24s linear infinite;
  }
  @keyframes gridDrift {
    from { background-position: 0 0; }
    to   { background-position: 40px 40px; }
  }

  body::after {
    content: '';
    position: fixed; top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 500px;
    background: radial-gradient(ellipse, rgba(127,255,178,0.05) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
    animation: glowPulse 7s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%,100% { opacity:0.5; transform:translateX(-50%) scale(1); }
    50%      { opacity:1;   transform:translateX(-50%) scale(1.12); }
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(18px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .container {
    position: relative; z-index: 1;
    width: 100%; max-width: 840px;
    display: flex; flex-direction: column; gap: 28px;
    animation: fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) both;
  }

  header {
    display: flex; flex-direction: column; gap: 8px;
    animation: fadeUp 0.55s 0.06s cubic-bezier(0.22,1,0.36,1) both;
  }

  .badge {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.2em; color: var(--accent);
    text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }
  .badge::before {
    content: ''; width: 24px; height: 1px; background: var(--accent);
    animation: expandLine 0.9s 0.3s ease both;
  }
  @keyframes expandLine {
    from { width:0; opacity:0; } to { width:24px; opacity:1; }
  }

  h1 {
    font-family: var(--mono);
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 700; line-height: 1.1; letter-spacing: -0.02em;
  }
  h1 span { color: var(--accent); }

  .subtitle { font-size: 13px; color: var(--muted); font-weight: 300; line-height: 1.6; }

  /* ── Mac Window ── */
  .mac-window {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04) inset,
      0 28px 80px rgba(0,0,0,0.65),
      0 2px 4px rgba(0,0,0,0.4);
    animation: fadeUp 0.55s 0.12s cubic-bezier(0.22,1,0.36,1) both;
    transition: box-shadow 0.4s;
    position: relative;
  }
  .mac-window:hover {
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.05) inset,
      0 36px 100px rgba(0,0,0,0.75),
      0 2px 4px rgba(0,0,0,0.4);
  }
  .mac-window::before {
    content: '';
    position: absolute; top:0; left:0; right:0; height:1px; z-index:3;
    background: linear-gradient(90deg,
      transparent 0%, rgba(127,255,178,0.25) 25%,
      rgba(127,255,178,0.55) 50%, rgba(127,255,178,0.25) 75%, transparent 100%);
  }

  /* titlebar */
  .titlebar {
    height: 44px; padding: 0 16px;
    background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    border-bottom: 1px solid var(--border2);
    display: flex; align-items: center;
    position: relative; user-select: none;
  }

  .traffic-lights { display: flex; gap: 8px; align-items: center; }
  .tl {
    width: 12px; height: 12px; border-radius: 50%;
    position: relative; cursor: default;
    transition: filter 0.15s, transform 0.15s;
  }
  .tl:hover { filter: brightness(1.25); transform: scale(1.1); }
  .tl::after {
    content: ''; position: absolute; inset: 2px;
    border-radius: 50%; background: rgba(255,255,255,0.25);
  }
  .tl-red    { background: radial-gradient(circle at 35% 35%, #ff7f73, #ff5f57); box-shadow: 0 0 5px rgba(255,95,87,0.45); }
  .tl-yellow { background: radial-gradient(circle at 35% 35%, #ffd870, #ffbd2e); box-shadow: 0 0 5px rgba(255,189,46,0.45); }
  .tl-green  { background: radial-gradient(circle at 35% 35%, #6df97e, #28c941); box-shadow: 0 0 5px rgba(40,201,65,0.45); }

  .titlebar-title {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.06em; color: var(--muted);
    pointer-events: none;
  }

  /* tabbar */
  .tabbar {
    display: flex; align-items: flex-end;
    padding: 0 16px; gap: 2px;
    background: rgba(0,0,0,0.25);
    border-bottom: 1px solid var(--border2);
    height: 38px;
  }
  .tab {
    padding: 0 16px; height: 30px;
    display: flex; align-items: center; gap: 7px;
    font-family: var(--mono); font-size: 11px;
    color: var(--muted); letter-spacing: 0.04em;
    border-radius: 7px 7px 0 0;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent; border-bottom: none;
    position: relative;
  }
  .tab:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .tab.active {
    color: var(--text); background: var(--surface);
    border-color: var(--border2); margin-bottom: -1px; z-index: 1;
  }
  .tab-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--border); flex-shrink: 0;
    transition: background 0.25s, box-shadow 0.25s;
  }
  .tab.active .tab-dot {
    background: var(--accent);
    box-shadow: 0 0 6px rgba(127,255,178,0.7);
  }
  .tab-badge {
    display: none; font-size: 9px;
    background: rgba(127,255,178,0.15);
    color: var(--accent); border: 1px solid rgba(127,255,178,0.2);
    padding: 0 5px; border-radius: 3px;
  }

  /* panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* input panel */
  .input-area {
    padding: 20px;
    display: flex; flex-direction: column; gap: 14px;
  }

  .editor-wrap {
    position: relative; border-radius: 8px; overflow: hidden;
    border: 1px solid var(--border);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .editor-wrap:focus-within {
    border-color: rgba(127,255,178,0.3);
    box-shadow: 0 0 0 3px rgba(127,255,178,0.07);
  }

  .line-numbers {
    position: absolute; left:0; top:0; bottom:0; width:40px;
    background: rgba(0,0,0,0.25);
    border-right: 1px solid var(--border2);
    padding: 14px 0; overflow: hidden;
    display: flex; flex-direction: column; align-items: flex-end;
    padding-right: 8px; pointer-events: none;
  }
  .line-numbers span {
    font-family: var(--mono); font-size: 11px;
    color: var(--muted); opacity: 0.35;
    line-height: 1.8; height: 23.4px; display: block;
  }

  textarea {
    width: 100%; min-height: 200px;
    background: var(--bg); border: none;
    color: var(--text); font-family: var(--mono);
    font-size: 13px; line-height: 1.8;
    padding: 14px 14px 14px 52px;
    resize: vertical; outline: none; display: block;
  }
  textarea::placeholder { color: var(--muted); opacity: 0.45; }

  .hint {
    font-size: 11px; color: var(--muted);
    font-family: var(--mono); line-height: 1.7;
    padding: 10px 14px;
    background: rgba(127,255,178,0.03);
    border: 1px solid rgba(127,255,178,0.07);
    border-radius: 6px;
    display: flex; gap: 8px; align-items: flex-start;
  }
  .hint::before { content: 'ℹ'; color: var(--accent); flex-shrink: 0; margin-top: 1px; }
  .hint strong { color: var(--accent); }

  /* toolbar */
  .toolbar {
    padding: 12px 20px; border-top: 1px solid var(--border2);
    display: flex; gap: 8px; align-items: center;
    background: rgba(0,0,0,0.18);
  }
  .spacer { flex: 1; }

  /* buttons */
  button {
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.08em; border: none;
    cursor: pointer; padding: 8px 18px;
    border-radius: 6px;
    transition: all 0.18s cubic-bezier(0.22,1,0.36,1);
    text-transform: uppercase; position: relative; overflow: hidden;
  }
  button::after {
    content: ''; position: absolute; inset: 0;
    background: rgba(255,255,255,0); transition: background 0.15s;
  }
  button:hover::after { background: rgba(255,255,255,0.07); }
  button:active { transform: scale(0.96) !important; }

  .btn-parse {
    background: var(--accent); color: #0a0a0f; font-weight: 700;
    box-shadow: 0 2px 12px rgba(127,255,178,0.25);
  }
  .btn-parse:hover {
    box-shadow: 0 4px 24px rgba(127,255,178,0.45);
    transform: translateY(-1px);
  }

  .btn-download {
    background: var(--accent2); color: #0a0a0f; font-weight: 700;
    box-shadow: 0 2px 12px rgba(255,127,80,0.25);
  }
  .btn-download:hover {
    box-shadow: 0 4px 24px rgba(255,127,80,0.45);
    transform: translateY(-1px);
  }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border); color: var(--muted);
  }
  .btn-ghost:hover { border-color: var(--muted); color: var(--text); }

  /* error */
  .error-msg {
    display: none; font-family: var(--mono); font-size: 11px;
    color: #ff6b6b; padding: 8px 14px;
    background: rgba(255,107,107,0.06);
    border: 1px solid rgba(255,107,107,0.15);
    border-radius: 6px; margin: 0 20px 12px;
    animation: shakeX 0.3s ease;
    gap: 8px; align-items: center;
  }
  .error-msg.visible { display: flex; }
  .error-msg::before { content: '✕'; flex-shrink: 0; }
  @keyframes shakeX {
    0%,100%{ transform:translateX(0); }
    25%    { transform:translateX(-4px); }
    75%    { transform:translateX(4px); }
  }

  /* files panel header */
  .files-panel-header {
    padding: 12px 20px; border-bottom: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(0,0,0,0.12);
  }
  .files-panel-title {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase;
  }
  .pill {
    font-family: var(--mono); font-size: 10px;
    color: var(--accent); background: rgba(127,255,178,0.1);
    border: 1px solid rgba(127,255,178,0.2);
    padding: 2px 10px; border-radius: 999px;
  }

  .files-list { display: flex; flex-direction: column; }

  /* file item */
  @keyframes slideInFile {
    from { opacity:0; transform:translateX(-8px); }
    to   { opacity:1; transform:translateX(0); }
  }

  .file-item {
    border-top: 1px solid var(--border2);
    animation: slideInFile 0.28s cubic-bezier(0.22,1,0.36,1) both;
  }
  .file-item:first-child { border-top: none; }

  .file-header {
    padding: 10px 20px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; user-select: none;
    transition: background 0.15s;
  }
  .file-header:hover { background: rgba(255,255,255,0.025); }

  .file-icon { font-size: 15px; width: 22px; text-align: center; flex-shrink: 0; }

  .file-path-wrap { flex: 1; min-width: 0; }
  .file-name { font-family: var(--mono); font-size: 12px; color: var(--text); }
  .file-dir  { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 1px; }

  .file-ext {
    font-family: var(--mono); font-size: 10px;
    color: var(--muted); background: var(--border);
    padding: 1px 7px; border-radius: 3px; flex-shrink: 0;
  }

  .chevron {
    width: 16px; height: 16px; flex-shrink: 0; color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
  }
  .chevron svg { width: 10px; height: 10px; }
  .file-item.open .chevron { transform: rotate(90deg); }

  /* smooth open/close with grid trick */
  .file-content-wrap {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.3s cubic-bezier(0.22,1,0.36,1);
  }
  .file-item.open .file-content-wrap { grid-template-rows: 1fr; }

  .file-content-inner { overflow: hidden; }
  .file-content-inner-pad {
    padding: 0 20px;
    transition: padding 0.3s cubic-bezier(0.22,1,0.36,1);
  }
  .file-item.open .file-content-inner-pad { padding: 4px 20px 16px; }

  .file-content {
    width: 100%; min-height: 100px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border2);
    border-radius: 6px; color: var(--text);
    font-family: var(--mono); font-size: 12px; line-height: 1.7;
    padding: 12px 14px; resize: vertical; outline: none; display: block;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .file-content:focus {
    border-color: rgba(127,255,178,0.28);
    box-shadow: 0 0 0 3px rgba(127,255,178,0.06);
  }

  /* empty state */
  .empty-state {
    padding: 56px 20px;
    display: flex; flex-direction: column;
    align-items: center; gap: 14px;
  }
  .empty-icon {
    font-size: 36px; opacity: 0.25;
    animation: floatIcon 4s ease-in-out infinite;
  }
  @keyframes floatIcon {
    0%,100%{ transform:translateY(0); }
    50%    { transform:translateY(-7px); }
  }
  .empty-text {
    font-family: var(--mono); font-size: 12px;
    color: var(--muted); opacity: 0.5;
    text-align: center; line-height: 1.7;
  }

  /* statusbar */
  .statusbar {
    height: 24px; padding: 0 16px;
    border-top: 1px solid var(--border2);
    display: flex; align-items: center; gap: 16px;
    background: rgba(0,0,0,0.22);
  }
  .status-item {
    font-family: var(--mono); font-size: 10px;
    color: var(--muted);
    display: flex; align-items: center; gap: 5px;
  }
  .status-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 4px var(--accent);
    animation: statusPulse 2.8s ease-in-out infinite;
  }
  @keyframes statusPulse {
    0%,100%{ opacity:1; } 50%{ opacity:0.25; }
  }
  .status-right { margin-left: auto; opacity: 0.4; }

  /* toast */
  .toast {
    position: fixed; bottom: 32px; right: 32px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 18px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6),
                0 0 0 1px rgba(255,255,255,0.04) inset;
    transform: translateY(80px) scale(0.94);
    opacity: 0;
    transition: all 0.42s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100; pointer-events: none;
  }
  .toast.show { transform: translateY(0) scale(1); opacity: 1; }
  .toast-icon {
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(127,255,178,0.12);
    border: 1px solid rgba(127,255,178,0.28);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--accent); flex-shrink: 0;
  }
  .toast-title { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--text); }
  .toast-sub   { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="badge">utility tool</div>
    <h1>tree <span>→</span> zip</h1>
    <p class="subtitle">ファイルツリーを入力 → 内容を編集 → ZIPでダウンロード</p>
  </header>

  <div class="mac-window">

    <!-- titlebar -->
    <div class="titlebar">
      <div class="traffic-lights">
        <div class="tl tl-red"></div>
        <div class="tl tl-yellow"></div>
        <div class="tl tl-green"></div>
      </div>
      <span class="titlebar-title" id="win-title">tree-to-zip — new project</span>
    </div>

    <!-- tabbar -->
    <div class="tabbar">
      <div class="tab active" id="tab-input" onclick="switchTab('input')">
        <span class="tab-dot"></span>tree input
      </div>
      <div class="tab" id="tab-files" onclick="switchTab('files')">
        <span class="tab-dot"></span>files
        <span class="tab-badge" id="tab-badge"></span>
      </div>
    </div>

    <!-- INPUT PANEL -->
    <div class="panel active" id="panel-input">
      <div class="input-area">
        <div class="editor-wrap">
          <div class="line-numbers" id="line-numbers"><span>1</span></div>
          <textarea id="tree-input" spellcheck="false"
            placeholder="my-project
 ├ server.js
 ├ package.json
 └ public
     └ index.html"
            oninput="updateLineNumbers(this)"></textarea>
        </div>
        <div class="hint">
          <strong>├ └ │</strong> などのツリー文字か、スペース／タブのインデントに対応。最初の行がルートディレクトリ名になります。
        </div>
      </div>
      <div id="error-msg" class="error-msg"></div>
      <div class="toolbar">
        <button class="btn-parse" onclick="parseTree()">▶ Parse</button>
        <button class="btn-ghost" onclick="clearAll()">Clear</button>
      </div>
    </div>

    <!-- FILES PANEL -->
    <div class="panel" id="panel-files">
      <div class="files-panel-header">
        <span class="files-panel-title">Edit file contents</span>
        <span class="pill" id="file-count">0 files</span>
      </div>
      <div class="files-list" id="files-list">
        <div class="empty-state">
          <div class="empty-icon">📂</div>
          <div class="empty-text">ツリーを入力して Parse してください</div>
        </div>
      </div>
      <div class="toolbar">
        <button class="btn-ghost" onclick="switchTab('input')">← Edit Tree</button>
        <span class="spacer"></span>
        <button class="btn-download" onclick="downloadZip()">⬇ Download ZIP</button>
      </div>
    </div>

    <!-- statusbar -->
    <div class="statusbar">
      <div class="status-item">
        <div class="status-dot"></div>
        <span id="status-text">ready</span>
      </div>
      <div class="status-item status-right">tree → zip v2</div>
    </div>

  </div>
</div>

<!-- toast -->
<div class="toast" id="toast">
  <div class="toast-icon">✓</div>
  <div>
    <div class="toast-title" id="toast-title">downloaded</div>
    <div class="toast-sub" id="toast-sub">ダウンロードが開始されました</div>
  </div>
</div>

<script>
/* line numbers */
function updateLineNumbers(ta) {
  const n = ta.value.split('\n').length;
  document.getElementById('line-numbers').innerHTML =
    Array.from({length: Math.max(n,1)}, (_,i) => `<span>${i+1}</span>`).join('');
}
updateLineNumbers(document.getElementById('tree-input'));

/* tabs */
function switchTab(name) {
  ['input','files'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===name);
    document.getElementById('panel-'+t).classList.toggle('active', t===name);
  });
}

/* icons */
const ICONS = {
  js:'📜',ts:'📘',jsx:'⚛️',tsx:'⚛️',
  html:'🌐',css:'🎨',scss:'🎨',sass:'🎨',
  json:'📋',md:'📝',txt:'📄',
  py:'🐍',rs:'🦀',go:'🐹',
  sh:'💻',env:'🔒',yaml:'⚙️',yml:'⚙️',
  svg:'🖼️',png:'🖼️',jpg:'🖼️',
  default:'📄'
};
const getExt  = n => { const p=n.split('.'); return p.length>1?p[p.length-1].toLowerCase():''; };
const getIcon = n => ICONS[getExt(n)] || ICONS.default;

/* parse */
function parseTree() {
  const raw = document.getElementById('tree-input').value.trim();
  showError('');
  if (!raw) { showError('ツリーテキストを入力してください。'); return; }
  const files = extractFiles(raw);
  if (!files.length) { showError('ファイルが検出できませんでした。'); return; }

  const root = raw.split('\n')[0].replace(/[│├└─┤┐┘┼╔╗╚╝╠╣╦╩╬\s]/g,'').trim();
  document.getElementById('win-title').textContent = `tree-to-zip — ${root}`;

  renderFiles(files);
  switchTab('files');
  setStatus(`${files.length} files parsed`);
}

function extractFiles(text) {
  const lines = text.split('\n');
  const files = [];
  const root  = lines[0].replace(/[│├└─┤┐┘┼╔╗╚╝╠╣╦╩╬\s]/g,'').trim();
  const dirs  = [];

  for (let i=1; i<lines.length; i++) {
    const line = lines[i];
    if (!line.trim()) continue;

    const clean = line
      .replace(/├/g,' ').replace(/└/g,' ')
      .replace(/│/g,' ').replace(/─/g,' ')
      .replace(/[┤┐┘┼╔╗╚╝╠╣╦╩╬]/g,' ');

    const spaces = clean.length - clean.trimStart().length;
    const depth  = Math.max(1, Math.ceil(spaces/2));
    const name   = clean.trim();
    if (!name) continue;

    if (looksLikeFile(name)) {
      const parents = dirs.slice(0, depth-1).filter(Boolean);
      files.push({ path: [root, ...parents, name].join('/') });
    } else {
      dirs[depth-1] = name;
      dirs.length = depth;
    }
  }
  return files;
}

function looksLikeFile(n) {
  if (n.includes('.')) return true;
  return ['makefile','dockerfile','procfile','readme','license',
          'gitignore','gitattributes','.env','.babelrc','.eslintrc']
    .includes(n.toLowerCase()) || n.startsWith('.');
}

/* render */
function renderFiles(files) {
  const list = document.getElementById('files-list');
  list.innerHTML = '';
  document.getElementById('file-count').textContent = `${files.length} file${files.length!==1?'s':''}`;
  const badge = document.getElementById('tab-badge');
  badge.textContent = files.length;
  badge.style.display = 'inline';

  files.forEach((f, i) => {
    const fname = f.path.split('/').pop();
    const fdir  = f.path.split('/').slice(0,-1).join('/');
    const ext   = getExt(fname);

    const el = document.createElement('div');
    el.className = 'file-item' + (i===0?' open':'');
    el.style.animationDelay = `${i*0.04}s`;
    el.innerHTML = `
      <div class="file-header" onclick="toggleFile(this.parentElement)">
        <span class="file-icon">${getIcon(fname)}</span>
        <div class="file-path-wrap">
          <div class="file-name">${fname}</div>
          ${fdir ? `<div class="file-dir">${fdir}/</div>` : ''}
        </div>
        ${ext ? `<span class="file-ext">.${ext}</span>` : ''}
        <div class="chevron">
          <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8">
            <polyline points="3,2 7,5 3,8"/>
          </svg>
        </div>
      </div>
      <div class="file-content-wrap">
        <div class="file-content-inner">
          <div class="file-content-inner-pad">
            <textarea class="file-content"
              placeholder="// ${fname} の内容&#10;// 空のままでも OK"
              data-path="${f.path}"></textarea>
          </div>
        </div>
      </div>`;
    list.appendChild(el);
  });
}

function toggleFile(item) { item.classList.toggle('open'); }

/* download */
async function downloadZip() {
  const tas = document.querySelectorAll('.file-content');
  if (!tas.length) { showError('まずツリーをパースしてください。'); return; }

  const zip  = new JSZip();
  tas.forEach(ta => {
    const p = ta.dataset.path.replace(/\\/g,'/').replace(/^\//,'');
    zip.file(p, ta.value, { binary: false });
  });

  const root = tas[0].dataset.path.split('/')[0] || 'project';
  try {
    setStatus('generating zip…');
    const blob = await zip.generateAsync({ type: 'blob' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = root + '.zip'; a.click();
    URL.revokeObjectURL(url);
    showToast(root + '.zip', `${tas.length} files packed`);
    setStatus(`${root}.zip downloaded`);
  } catch(e) {
    showError('ZIPの生成に失敗しました: ' + e.message);
  }
}

/* clear */
function clearAll() {
  const ta = document.getElementById('tree-input');
  ta.value = '';
  updateLineNumbers(ta);
  document.getElementById('files-list').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">📂</div>
      <div class="empty-text">ツリーを入力して Parse してください</div>
    </div>`;
  document.getElementById('file-count').textContent = '0 files';
  document.getElementById('tab-badge').style.display = 'none';
  document.getElementById('win-title').textContent = 'tree-to-zip — new project';
  showError(''); setStatus('ready'); switchTab('input');
}

/* helpers */
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.toggle('visible', !!msg);
}
function setStatus(msg) { document.getElementById('status-text').textContent = msg; }
function showToast(title, sub) {
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-sub').textContent   = sub;
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}
</script>
